<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - DigsNat</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="container">
            <h1>Worker Portal</h1>
            <div class="header-actions">
                <button class="btn-notification" id="notifBtn">🔔 <span class="badge" id="notifCount">0</span></button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="container">
            <!-- Worker Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Active Jobs</h3>
                    <p class="stat-number" id="activeJobs">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p class="stat-number" id="completedJobs">0</p>
                </div>
                <div class="stat-card">
                    <h3>Earnings</h3>
                    <p class="stat-number" id="totalEarnings">₦0</p>
                </div>
                <div class="stat-card">
                    <h3>Rating</h3>
                    <p class="stat-number" id="avgRating">⭐ 0</p>
                </div>
            </div>

            <!-- Available Jobs -->
            <section class="jobs-section">
                <h2>Available Jobs</h2>
                <div id="availableJobs"></div>
            </section>

            <!-- My Active Jobs -->
            <section class="jobs-section">
                <h2>My Active Jobs</h2>
                <div id="myActiveJobs"></div>
            </section>

            <!-- Completed Jobs -->
            <section class="jobs-section">
                <h2>Completed Jobs</h2>
                <div id="completedJobsList"></div>
            </section>
        </div>
    </main>

    <!-- Quotation Modal -->
    <div class="modal" id="quotationModal">
        <div class="modal-content">
            <h3>Submit Quotation</h3>
            <form id="quotationForm">
                <div class="form-group">
                    <label>Materials Needed</label>
                    <textarea id="materials" rows="3" placeholder="List materials..."></textarea>
                </div>
                <div class="form-group">
                    <label>Work Description</label>
                    <textarea id="workDesc" rows="3" placeholder="Describe the work..."></textarea>
                </div>
                <div class="form-group">
                    <label>Base Price (₦)</label>
                    <input type="number" id="basePrice" required>
                    <p class="hint">System will add 30% (Customer sees: ₦<span id="finalPrice">0</span>)</p>
                </div>
                <button type="submit" class="btn-primary">Submit Quote</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
    <script>
        let currentJobForQuote = null;

        document.addEventListener('DOMContentLoaded', async function() {
            // Check for token in URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                await validateWorkerToken(token);
            } else {
                const session = JSON.parse(localStorage.getItem('user_session'));
                if (!session || session.role !== 'worker') {
                    alert('Invalid access');
                    window.location.href = '/index.html';
                    return;
                }
            }

            loadWorkerDashboard();
            startNotificationPolling();
        });

        async function validateWorkerToken(token) {
            const { data: worker, error } = await supabaseClient
                .from('workers')
                .select('*')
                .eq('access_token', token)
                .eq('status', 'active')
                .single();

            if (error || !worker) {
                alert('Invalid or expired access');
                window.location.href = '/index.html';
                return;
            }

            localStorage.setItem('user_session', JSON.stringify({
                role: 'worker',
                id: worker.id,
                email: worker.email,
                name: worker.full_name
            }));
        }

        async function loadWorkerDashboard() {
            const session = JSON.parse(localStorage.getItem('user_session'));
            
            // Load stats
            const { data: active } = await supabaseClient
                .from('jobs')
                .select('*', { count: 'exact' })
                .eq('worker_id', session.id)
                .in('status', ['accepted', 'in_progress']);

            const { data: completed } = await supabaseClient
                .from('jobs')
                .select('*', { count: 'exact' })
                .eq('worker_id', session.id)
                .eq('status', 'completed');

            const { data: earnings } = await supabaseClient
                .from('jobs')
                .select('price')
                .eq('worker_id', session.id)
                .eq('status', 'completed');

            const { data: ratings } = await supabaseClient
                .from('ratings')
                .select('rating')
                .eq('worker_id', session.id);

            document.getElementById('activeJobs').textContent = active?.length || 0;
            document.getElementById('completedJobs').textContent = completed?.length || 0;
            
            const totalEarn = earnings?.reduce((sum, j) => sum + (j.price || 0), 0) || 0;
            document.getElementById('totalEarnings').textContent = '₦' + totalEarn.toLocaleString();

            const avgRating = ratings?.length 
                ? (ratings.reduce((sum, r) => sum + r.rating, 0) / ratings.length).toFixed(1)
                : 0;
            document.getElementById('avgRating').textContent = '⭐ ' + avgRating;

            // Load available jobs in worker's state
            const { data: workerData } = await supabaseClient
                .from('workers')
                .select('state, services')
                .eq('id', session.id)
                .single();

            const { data: available } = await supabaseClient
                .from('jobs')
                .select('*, customers(email), services(name)')
                .eq('state', workerData.state)
                .eq('status', 'pending')
                .is('worker_id', null);

            const availContainer = document.getElementById('availableJobs');
            if (available && available.length > 0) {
                available.forEach(job => {
                    const card = createJobCard(job, 'available');
                    availContainer.appendChild(card);
                });
            } else {
                availContainer.innerHTML = '<p class="empty">No available jobs in your area</p>';
            }

            // Load my active jobs
            const { data: myJobs } = await supabaseClient
                .from('jobs')
                .select('*, customers(email), services(name)')
                .eq('worker_id', session.id)
                .in('status', ['accepted', 'in_progress']);

            const activeContainer = document.getElementById('myActiveJobs');
            if (myJobs && myJobs.length > 0) {
                myJobs.forEach(job => {
                    const card = createJobCard(job, 'active');
                    activeContainer.appendChild(card);
                });
            } else {
                activeContainer.innerHTML = '<p class="empty">No active jobs</p>';
            }

            // Load completed
            const { data: doneJobs } = await supabaseClient
                .from('jobs')
                .select('*, customers(email), services(name)')
                .eq('worker_id', session.id)
                .eq('status', 'completed')
                .order('completed_at', { ascending: false });

            const doneContainer = document.getElementById('completedJobsList');
            if (doneJobs && doneJobs.length > 0) {
                doneJobs.forEach(job => {
                    const card = createJobCard(job, 'completed');
                    doneContainer.appendChild(card);
                });
            } else {
                doneContainer.innerHTML = '<p class="empty">No completed jobs yet</p>';
            }
        }

        function createJobCard(job, type) {
            const card = document.createElement('div');
            card.className = 'job-card';
            
            let actions = '';
            if (type === 'available') {
                actions = `
                    <button onclick="acceptJob('${job.id}')" class="btn-primary">Accept Job</button>
                    <button onclick="rejectJob('${job.id}')" class="btn-secondary">Reject</button>
                `;
            } else if (type === 'active') {
                if (job.type === 'quotation' && !job.quotation_price) {
                    actions = `<button onclick="openQuotation('${job.id}')" class="btn-primary">Submit Quotation</button>`;
                } else {
                    actions = `<button onclick="markDone('${job.id}')" class="btn-primary">Mark as Done</button>`;
                }
                actions += `<button onclick="openChat('${job.id}', '${job.customer_id}')" class="btn-secondary">Chat</button>`;
            }

            card.innerHTML = `
                <div class="job-header">
                    <h4>${job.services?.name}</h4>
                    <span class="location">${job.state}, ${job.lga}</span>
                </div>
                <p>${job.description}</p>
                ${job.image_url ? `<img src="${supabaseClient.storage.from('job_images').getPublicUrl(job.image_url).data.publicUrl}" class="job-image">` : ''}
                ${job.price ? `<p class="price">₦${job.price.toLocaleString()}</p>` : ''}
                ${job.quotation_price ? `<p class="quotation">Your Quote: ₦${job.quotation_price.toLocaleString()}</p>` : ''}
                <div class="job-actions">${actions}</div>
            `;
            return card;
        }

        async function acceptJob(jobId) {
            const session = JSON.parse(localStorage.getItem('user_session'));
            await supabaseClient
                .from('jobs')
                .update({ worker_id: session.id, status: 'accepted' })
                .eq('id', jobId);
            
            // Notify customer
            const { data: job } = await supabaseClient
                .from('jobs')
                .select('customer_id')
                .eq('id', jobId)
                .single();
            
            await createNotification(job.customer_id, 'A worker has accepted your job!');
            loadWorkerDashboard();
        }

        function openQuotation(jobId) {
            currentJobForQuote = jobId;
            document.getElementById('quotationModal').style.display = 'flex';
        }

        document.getElementById('basePrice').addEventListener('input', function() {
            const base = parseFloat(this.value) || 0;
            const final = base * 1.3;
            document.getElementById('finalPrice').textContent = final.toLocaleString();
        });

        document.getElementById('quotationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const basePrice = parseFloat(document.getElementById('basePrice').value);
            const finalPrice = basePrice * 1.3;

            await supabaseClient
                .from('jobs')
                .update({
                    quotation_price: finalPrice,
                    materials: document.getElementById('materials').value,
                    work_description: document.getElementById('workDesc').value
                })
                .eq('id', currentJobForQuote);

            // Notify customer
            const { data: job } = await supabaseClient
                .from('jobs')
                .select('customer_id')
                .eq('id', currentJobForQuote)
                .single();
            
            await createNotification(job.customer_id, 'You have a new quotation for your job!');
            
            document.getElementById('quotationModal').style.display = 'none';
            loadWorkerDashboard();
        });

        async function markDone(jobId) {
            await supabaseClient
                .from('jobs')
                .update({ status: 'awaiting_confirmation' })
                .eq('id', jobId);
            
            // Notify customer
            const { data: job } = await supabaseClient
                .from('jobs')
                .select('customer_id')
                .eq('id', jobId)
                .single();
            
            await createNotification(job.customer_id, 'Your job is complete! Please confirm.');
            loadWorkerDashboard();
        }

        function logout() {
            localStorage.removeItem('user_session');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
